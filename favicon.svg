<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B2D5E"/>
      <stop offset="100%" stop-color="#1A0F18"/>
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C9963A"/>
      <stop offset="100%" stop-color="#8B6020"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <!-- Gold border -->
  <rect x="1.5" y="1.5" width="61" height="61" rx="9" fill="none" stroke="url(#border)" stroke-width="1.5" opacity="0.7"/>
  <!-- V letter -->
  <text x="10" y="46" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" font-style="italic" fill="#C9963A">V</text>
  <!-- F letter — slightly offset for monogram effect -->
  <text x="33" y="46" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="400" font-style="italic" fill="#F2E0C0" opacity="0.85">F</text>
  <!-- Subtle gold underline -->
  <line x1="10" y1="50" x2="54" y2="50" stroke="#C9963A" stroke-width="1" opacity="0.4"/>
</svg>
